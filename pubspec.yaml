name: beads_out
description: A casual puzzle game where players tap to release colored beads onto a conveyor belt and sort them into matching containers.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management & routing
  flutter_riverpod: ^2.6.1
  go_router: ^14.8.1

  # Game engine
  flame: ^1.23.0

  # Firebase
  firebase_core: ^3.13.0
  firebase_auth: ^5.5.2
  cloud_firestore: ^5.6.6
  firebase_analytics: ^11.4.5
  firebase_remote_config: ^5.4.3
  firebase_crashlytics: ^4.3.5

  # Monetization
  google_mobile_ads: ^5.3.0

  # Local storage
  shared_preferences: ^2.5.3
  hive_flutter: ^1.1.0

  # Typography
  google_fonts: ^6.2.1

  # Utilities
  equatable: ^2.0.7
  uuid: ^4.5.1
  logger: ^2.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/backgrounds/
    - assets/images/ui/
    - assets/images/blocks/
    - assets/images/conveyor/
    - assets/images/particles/
    - assets/images/icons/
    - assets/audio/bgm/
    - assets/audio/sfx/
    - assets/audio/haptic/
    - assets/animations/
    - assets/levels/
    - assets/fonts/
    - assets/shaders/
